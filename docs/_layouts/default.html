<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="icon" type="image/svg+xml" href="https://book.cakephp.org/5.x/logo.svg">
    <link rel="shortcut icon" type="image/svg+xml" href="https://book.cakephp.org/5.x/logo.svg">

    <!-- GitHub Pages default styling -->
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.6;
        color: #24292e;
        background-color: #fff;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 45px;
      }
      h1, h2, h3, h4, h5, h6 {
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
        line-height: 1.25;
      }
      h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
      h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
      h3 { font-size: 1.25em; }
      code {
        padding: 0.2em 0.4em;
        margin: 0;
        font-size: 90%;
        background-color: rgba(27,31,35,0.05);
        border-radius: 3px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        white-space: pre-wrap;
        word-break: break-word;
      }
      pre {
        padding: 16px;
        overflow-x: auto;
        font-size: 90%;
        line-height: 1.45;
        background-color: #f6f8fa;
        border-radius: 6px;
        margin: 16px 0;
        border: 1px solid #e1e4e8;
      }
      pre code {
        background-color: transparent;
        padding: 0;
        font-size: 100%;
        white-space: pre;
        word-break: normal;
        display: block;
      }
      blockquote {
        padding: 0 1em;
        color: #6a737d;
        border-left: 0.25em solid #dfe2e5;
        margin: 0 0 16px 0;
      }
      blockquote > :first-child { margin-top: 0; }
      blockquote > :last-child { margin-bottom: 0; }
      blockquote strong {
        color: #24292e;
      }
      a { color: #0366d6; text-decoration: none; }
      a:hover { text-decoration: underline; }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 16px;
      }
      table th, table td {
        padding: 6px 13px;
        border: 1px solid #dfe2e5;
      }
      table tr { background-color: #fff; border-top: 1px solid #c6cbd1; }
      table tr:nth-child(2n) { background-color: #f6f8fa; }
      hr { border: 0; border-top: 1px solid #eaecef; margin: 24px 0; }
      
      /* Mermaid diagram styling */
      .mermaid {
        background-color: #fff;
        border: 1px solid #e1e4e8;
        border-radius: 6px;
        padding: 20px;
        margin: 20px 0;
        text-align: center;
      }
      
      /* Hide mermaid code blocks until processed */
      pre:has(code.language-mermaid) {
        display: none;
      }
      
      /* Responsive */
      @media (max-width: 768px) {
        .container {
          padding: 20px;
        }
        pre {
          font-size: 85%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      {% if site.title and site.title != page.title %}
      <h1>
        <img src="https://book.cakephp.org/5.x/logo.svg" alt="CakePHP Logo" style="height: 40px; vertical-align: middle; margin-right: 10px;">
        <a href="{{ "/" | relative_url }}" style="vertical-align: middle;">{{ site.title }}</a>
      </h1>
      {% endif %}

      {{ content }}

      {% if site.github.private != true %}
      <hr>
      <div style="text-align: center; color: #6a737d; font-size: 0.9em;">
        <p>Released under the MIT License. Copyright © Cake Software Foundation, Inc.</p>
      </div>
      {% endif %}
    </div>
    
    <!-- Mermaid JS for diagrams -->
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      
      // Initialize mermaid
      mermaid.initialize({ 
        startOnLoad: false,
        theme: 'default',
        securityLevel: 'loose',
        flowchart: {
          useMaxWidth: true,
          htmlLabels: true,
          curve: 'basis'
        }
      });
      
      // Convert mermaid code blocks to mermaid divs
      document.addEventListener('DOMContentLoaded', function() {
        // Find all code blocks with language-mermaid class
        const mermaidBlocks = document.querySelectorAll('code.language-mermaid');
        
        mermaidBlocks.forEach((block, index) => {
          // Get the mermaid code
          const code = block.textContent;
          
          // Create a new div for mermaid
          const mermaidDiv = document.createElement('div');
          mermaidDiv.className = 'mermaid';
          mermaidDiv.textContent = code;
          
          // Replace the pre block with the mermaid div
          const preBlock = block.closest('pre');
          if (preBlock) {
            preBlock.parentNode.insertBefore(mermaidDiv, preBlock);
            preBlock.remove();
          }
        });
        
        // Run mermaid after converting blocks
        mermaid.run();
      });
    </script>
  </body>
</html>
