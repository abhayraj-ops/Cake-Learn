<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">

    <!-- GitHub Pages default styling -->
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        line-height: 1.6;
        color: #24292e;
        background-color: #fff;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 45px;
      }
      h1, h2, h3, h4, h5, h6 {
        margin-top: 24px;
        margin-bottom: 16px;
        font-weight: 600;
        line-height: 1.25;
      }
      h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
      h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
      h3 { font-size: 1.25em; }
      code {
        padding: 0.2em 0.4em;
        margin: 0;
        font-size: 85%;
        background-color: rgba(27,31,35,0.05);
        border-radius: 3px;
      }
      pre {
        padding: 16px;
        overflow: auto;
        font-size: 85%;
        line-height: 1.45;
        background-color: #f6f8fa;
        border-radius: 3px;
      }
      pre code {
        background-color: transparent;
        padding: 0;
      }
      blockquote {
        padding: 0 1em;
        color: #6a737d;
        border-left: 0.25em solid #dfe2e5;
        margin: 0 0 16px 0;
      }
      blockquote > :first-child { margin-top: 0; }
      blockquote > :last-child { margin-bottom: 0; }
      a { color: #0366d6; text-decoration: none; }
      a:hover { text-decoration: underline; }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 16px;
      }
      table th, table td {
        padding: 6px 13px;
        border: 1px solid #dfe2e5;
      }
      table tr { background-color: #fff; border-top: 1px solid #c6cbd1; }
      table tr:nth-child(2n) { background-color: #f6f8fa; }
      hr { border: 0; border-top: 1px solid #eaecef; margin: 24px 0; }
    </style>
    
    <!-- Mermaid JS for diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        mermaid.initialize({ 
          startOnLoad: true,
          theme: 'default',
          securityLevel: 'loose'
        });
      });
    </script>
  </head>
  <body>
    <div class="container">
      {% if site.title and site.title != page.title %}
      <h1><a href="{{ "/" | relative_url }}">{{ site.title }}</a></h1>
      {% endif %}

      {{ content }}

      {% if site.github.private != true %}
      <hr>
      <div style="text-align: center; color: #6a737d; font-size: 0.9em;">
        <p>Released under the MIT License. Copyright © Cake Software Foundation, Inc.</p>
      </div>
      {% endif %}
    </div>
  </body>
</html>
